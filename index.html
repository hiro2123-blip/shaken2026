<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車検予約システム２０２６</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; font-weight: bold; }
        .selected-day { background-color: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10 text-xl">
    <div id="app" class="bg-white rounded-[40px] shadow-2xl p-8 md:p-16 max-w-6xl mx-auto border-4 border-blue-50">
        <div class="flex justify-between items-center mb-12 border-b-4 pb-8">
            <h1 class="text-4xl md:text-5xl text-blue-800" onclick="location.reload()">🏪 車検予約システム２０２６</h1>
            <div class="flex space-x-4">
                <button onclick="showSection('course-section')" class="px-6 py-3 bg-gray-200 rounded-2xl text-2xl hover:bg-gray-300">新規</button>
                <button onclick="checkAdmin()" class="px-6 py-3 bg-gray-200 rounded-2xl text-2xl hover:bg-gray-300">管理</button>
            </div>
        </div>

        <div id="main-content">
            <div id="course-section" class="view-section text-center py-10">
                <div class="grid grid-cols-1 gap-10">
                    <button onclick="selectCourse('スタンダード車検')" class="border-4 border-blue-200 p-16 rounded-[40px] bg-white shadow-xl hover:bg-blue-50 transition-all text-4xl md:text-5xl">⏱️ スタンダード車検</button>
                    <button onclick="selectCourse('セーフティ車検')" class="border-4 border-orange-200 p-16 rounded-[40px] bg-white shadow-xl hover:bg-orange-50 transition-all text-4xl md:text-5xl">🛡️ セーフティ車検</button>
                    <button onclick="selectCourse('一般整備・修理')" class="border-4 border-green-200 p-16 rounded-[40px] bg-white shadow-xl hover:bg-green-50 transition-all text-4xl md:text-5xl">🔧 一般整備・修理</button>
                </div>
            </div>

            <div id="form-section" class="view-section hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 text-2xl">
                    <div class="space-y-8">
                        <div class="border-2 rounded-3xl p-6 bg-white shadow-lg">
                            <div class="flex justify-between items-center mb-4 bg-slate-800 text-white p-4 rounded-2xl text-3xl">
                                <button onclick="moveMonth(-1)">＜</button><span id="cal-m"></span><button onclick="moveMonth(1)">＞</button>
                            </div>
                            <div id="cal-grid" class="grid grid-cols-7 gap-3 text-center text-3xl"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="border-2 p-4 rounded-2xl bg-white text-center"><button onclick="document.getElementById('f1').click()" class="bg-blue-50 w-full py-6 rounded-2xl text-xl">受付表</button><input type="file" id="f1" class="hidden" onchange="imgP(this,1)"><img id="i1" class="mt-4 mx-auto max-h-24 hidden"></div>
                            <div class="border-2 p-4 rounded-2xl bg-white text-center"><button onclick="document.getElementById('f2').click()" class="bg-blue-50 w-full py-6 rounded-2xl text-xl">車検証</button><input type="file" id="f2" class="hidden" onchange="imgP(this,2)"><img id="i2" class="mt-4 mx-auto max-h-24 hidden"></div>
                            <div class="border-2 p-4 rounded-2xl bg-white text-center"><button onclick="document.getElementById('f3').click()" class="bg-blue-50 w-full py-6 rounded-2xl text-xl">自賠責</button><input type="file" id="f3" class="hidden" onchange="imgP(this,3)"><img id="i3" class="mt-4 mx-auto max-h-24 hidden"></div>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <select id="sel-ss" class="w-full border-2 p-6 rounded-3xl text-3xl bg-white"><option value="">店舗を選択</option><option value="板橋ss">板橋ss</option><option value="志村ss">志村ss</option><option value="小茂根ss">小茂根ss</option><option value="赤羽西ss">赤羽西ss</option><option value="東坂下ss">東坂下ss</option><option value="高島平ss">高島平ss</option><option value="武蔵関ss">武蔵関ss</option><option value="車検課">車検課</option></select>
                        <input type="text" id="u-name" class="w-full border-2 p-6 rounded-3xl text-3xl" placeholder="お客様のお名前">
                        <input type="text" id="u-num" class="w-full border-2 p-6 rounded-3xl text-3xl" placeholder="車のナンバー">
                        <input type="text" id="u-memo" class="w-full border-2 p-6 rounded-3xl text-3xl" placeholder="備考・作業内容">
                        <div class="p-8 bg-blue-50 rounded-[40px] border-4 border-blue-100 leading-loose">
                            <p id="disp-c" class="text-blue-900 border-b-2 border-blue-200 pb-2 mb-2 text-4xl"></p>
                            <p id="row-s">🗓️ 車検日：<span id="date-s" class="text-blue-600">未選択</span></p>
                            <p id="row-a">🗓️ 入庫日：<span id="date-a" class="text-orange-600">未選択</span></p>
                        </div>
                        <button onclick="send()" id="sb-btn" class="w-full bg-blue-600 text-white py-10 rounded-[40px] text-4xl shadow-2xl hover:bg-blue-700 transition-all">予約を送信する</button>
                    </div>
                </div>
            </div>
            <div id="admin-section" class="view-section hidden font-bold">
                <div id="list-area" class="overflow-x-auto"><table class="w-full border-4 text-center text-2xl"><thead class="bg-blue-500 text-white"><tr><th class="p-4">日付</th><th class="p-4">店舗</th><th class="p-4">お名前</th></tr></thead><tbody id="list-body" class="divide-y-2"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyKoti6Ni5KvwTTTj07lfTjt2kw03FQ3Pl-Q9pYWIIiYK2YD_a8Ra5vWJCT7wSsTFI6/exec"; 
        let curC = '', selS = '', selA = '', vD = new Date(), pics = {1:"",2:"",3:""};
        const HOLS = ["2026/1/1","2026/1/12","2026/2/11","2026/2/23","2026/3/20","2026/4/29","2026/5/3","2026/5/4","2026/5/5","2026/5/6","2026/7/20","2026/8/11","2026/9/21","2026/9/22","2026/9/23","2026/10/12","2026/11/3","2026/11/23"];

        function imgP(input, n) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        pics[n] = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById(`i${n}`).src = pics[n];
                        document.getElementById(`i${n}`).classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function selectCourse(n) { 
            curC = n; document.getElementById('disp-c').innerText = n; 
            document.getElementById('row-s').classList.toggle('hidden', n==='一般整備・修理'); 
            document.getElementById('row-a').classList.toggle('hidden', n==='スタンダード車検'); 
            renderCal(); showSection('form-section'); 
        }

        function renderCal() {
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const y = vD.getFullYear(), m = vD.getMonth();
            document.getElementById('cal-m').innerText = `${y}年 ${m+1}月`;
            ['日','月','火','水','木','金','土'].forEach(d => grid.insertAdjacentHTML('beforeend', `<div class="text-gray-400 font-bold mb-4">${d}</div>`));
            const f = new Date(y, m, 1).getDay(), l = new Date(y, m+1, 0).getDate();
            for(let i=0; i<f; i++) grid.appendChild(document.createElement('div'));
            for(let i=1; i<=l; i++) {
                const k = `${y}/${m+1}/${i}`, dO = new Date(y, m, i);
                const isH = dO.getDay()===0 || dO.getDay()===6 || HOLS.includes(k);
                const div = document.createElement('div');
                div.className = `p-4 border-2 rounded-2xl flex items-center justify-center cursor-pointer ${isH?'text-red-300':'hover:bg-blue-100'}`;
                div.innerHTML = i;
                div.onclick = () => { 
                    document.querySelectorAll('#cal-grid div').forEach(d => d.classList.remove('selected-day')); 
                    div.classList.add('selected-day'); 
                    if (curC==='一般整備・修理') { selA = k; selS = ""; } 
                    else { selS = k; selA = (curC==='セーフティ車検') ? getPrevBiz(k) : ""; } 
                    document.getElementById('date-s').innerText = selS || '-'; 
                    document.getElementById('date-a').innerText = selA || '-'; 
                };
                grid.appendChild(div);
            }
        }
        function getPrevBiz(ds) { let d = new Date(ds); do { d.setDate(d.getDate()-1); } while (d.getDay()===0||d.getDay()===6||HOLS.includes(`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`)); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
        async function send() { const btn = document.getElementById('sb-btn'); btn.innerText = "送信中..."; btn.disabled = true; const data = { shakenDate: selS, arrivalDate: selA, ss: document.getElementById('sel-ss').value, course: curC, name: document.getElementById('u-name').value, carNum: document.getElementById('u-num').value, memo: document.getElementById('u-memo').value, photo1: pics[1], photo2: pics[2], photo3: pics[3] }; try { await fetch(GAS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)}); alert('送信完了'); location.reload(); } catch(e) { alert('エラー'); btn.disabled = false; btn.innerText = "送信する"; } }
        function showSection(id) { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function moveMonth(d) { vD.setMonth(vD.getMonth() + d); renderCal(); }
        function checkAdmin() { if (prompt("PW") === "ss1234") { showSection('admin-section'); fetch(GAS_URL + "?action=getData").then(res => res.json()).then(data => { const b = document.getElementById('list-body'); b.innerHTML = ''; data.forEach(r => { b.insertAdjacentHTML('beforeend', `<tr><td class="p-4">${r.shakenDate || r.arrivalDate}</td><td class="p-4">${r.ss}</td><td class="p-4">${r.name}</td></tr>`); }); }); } }
    </script>
</body>
</html>
