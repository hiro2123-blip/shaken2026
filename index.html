<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車検予約システム２０２６</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; font-weight: bold; overflow-x: hidden; }
        .selected-day { background-color: #3b82f6 !important; color: white !important; }
        .disabled-day { color: #e2e8f0 !important; cursor: not-allowed !important; background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4 text-base">
    <div id="app" class="bg-white rounded-3xl shadow-xl p-4 md:p-6 max-w-7xl mx-auto border-2 border-blue-50">
        <div class="flex justify-between items-center mb-4 border-b-2 pb-2">
            <h1 class="text-xl md:text-3xl text-blue-800 font-black" onclick="location.reload()">🏪 車検予約システム２０２６</h1>
            <div class="flex space-x-2">
                <button onclick="showSection('course-section')" class="px-4 py-2 bg-gray-200 rounded-xl text-lg">新規</button>
                <button onclick="checkAdmin('ss1234')" class="px-4 py-2 bg-gray-200 rounded-xl text-lg">管理</button>
            </div>
        </div>

        <div id="main-content">
            <div id="course-section" class="view-section py-4">
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="selectCourse('スタンダード車検')" class="border-4 border-blue-200 p-6 rounded-3xl bg-white shadow-lg hover:bg-blue-50 text-lg md:text-2xl font-black">⏱️<br>スタンダード車検</button>
                    <button onclick="selectCourse('セーフティ車検')" class="border-4 border-orange-200 p-6 rounded-3xl bg-white shadow-lg hover:bg-orange-50 text-lg md:text-2xl font-black">🛡️<br>セーフティ車検</button>
                    <button onclick="selectCourse('一般整備・修理')" class="border-4 border-green-200 p-6 rounded-3xl bg-white shadow-lg hover:bg-green-50 text-lg md:text-2xl font-black">🔧<br>一般整備・修理</button>
                </div>
            </div>

            <div id="form-section" class="view-section hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="border-2 rounded-2xl p-2 bg-white shadow-inner">
                            <div class="flex justify-between items-center mb-2 bg-slate-800 text-white p-3 rounded-xl text-2xl font-bold">
                                <button onclick="moveMonth(-1)">＜</button><span id="cal-m"></span><button onclick="moveMonth(1)">＞</button>
                            </div>
                            <div id="cal-grid" class="grid grid-cols-7 gap-1 text-center text-xl"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="border-2 p-2 rounded-xl bg-white text-center"><button onclick="document.getElementById('f1').click()" class="bg-blue-50 w-full py-2 rounded-lg font-bold text-sm">受付表</button><input type="file" id="f1" class="hidden" onchange="imgP(this,1)"><img id="i1" class="mt-1 mx-auto max-h-16 hidden"></div>
                            <div class="border-2 p-2 rounded-xl bg-white text-center"><button onclick="document.getElementById('f2').click()" class="bg-blue-50 w-full py-2 rounded-lg font-bold text-sm">車検証</button><input type="file" id="f2" class="hidden" onchange="imgP(this,2)"><img id="i2" class="mt-1 mx-auto max-h-16 hidden"></div>
                            <div class="border-2 p-2 rounded-xl bg-white text-center"><button onclick="document.getElementById('f3').click()" class="bg-blue-50 w-full py-2 rounded-lg font-bold text-sm">自賠責</button><input type="file" id="f3" class="hidden" onchange="imgP(this,3)"><img id="i3" class="mt-1 mx-auto max-h-16 hidden"></div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <select id="sel-ss" onchange="handleStoreChange(this.value)" class="w-full border-4 p-4 rounded-2xl bg-white text-2xl font-black"><option value="">店舗を選択</option><option value="板橋ss">板橋ss</option><option value="志村ss">志村ss</option><option value="小茂根ss">小茂根ss</option><option value="赤羽西ss">赤羽西ss</option><option value="東坂下ss">東坂下ss</option><option value="高島平ss">高島平ss</option><option value="武蔵関ss">武蔵関ss</option><option value="車検課" style="color:red">車検課 ★</option></select>
                        <input type="text" id="u-name" class="w-full border-4 p-4 rounded-2xl text-2xl font-black" placeholder="お客様名">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="u-model" class="border-4 p-4 rounded-2xl text-2xl font-black" placeholder="車種">
                            <input type="text" id="u-num" class="border-4 p-4 rounded-2xl text-2xl font-black" placeholder="ナンバー">
                        </div>
                        <input type="text" id="u-memo" class="w-full border-4 p-4 rounded-2xl text-2xl font-black" placeholder="備考・作業内容">
                        <div class="p-6 bg-blue-50 rounded-[30px] border-4 border-blue-100 text-2xl">
                            <p id="disp-c" class="text-blue-900 border-b-4 border-blue-200 mb-2 font-black"></p>
                            <p id="row-s">🗓️ 車検：<span id="date-s" class="text-blue-600 font-black">未選択</span></p>
                            <p id="row-a">🗓️ 入庫：<span id="date-a" class="text-orange-600 font-black">未選択</span></p>
                        </div>
                        <button onclick="openConfirm()" class="w-full bg-blue-600 text-white py-6 rounded-[30px] text-3xl shadow-2xl hover:bg-blue-700 transition font-black">予約内容を確認する</button>
                    </div>
                </div>
            </div>

            <div id="confirm-section" class="view-section hidden py-4">
                <div class="bg-blue-50 rounded-[40px] p-8 border-4 border-blue-200 max-w-2xl mx-auto shadow-2xl">
                    <h2 class="text-3xl text-center mb-8 font-black text-blue-800">予約内容の最終確認</h2>
                    <div id="confirm-data" class="space-y-4 text-2xl mb-10 leading-relaxed"></div>
                    <div class="grid grid-cols-2 gap-6">
                        <button onclick="showSection('form-section')" class="bg-gray-400 text-white py-6 rounded-[30px] text-2xl font-black">修正する</button>
                        <button onclick="send()" id="sb-btn" class="bg-red-600 text-white py-6 rounded-[30px] text-2xl font-black">このまま送信</button>
                    </div>
                </div>
            </div>

            <div id="admin-section" class="view-section hidden font-bold">
                <div class="flex space-x-4 mb-4 border-b-4 pb-2">
                    <button onclick="switchAdminTab('shaken')" id="tab-s" class="text-2xl px-4 border-b-8 border-blue-500 text-blue-600">車検一覧</button>
                    <button onclick="switchAdminTab('factory')" id="tab-f" class="text-2xl px-4 text-gray-400">工場一覧</button>
                </div>
                <div id="area-s" class="overflow-x-auto"><table class="w-full border-2 text-left text-lg"><thead class="bg-blue-50"><tr><th class="p-3 border">車検日</th><th class="p-3 border">コース名</th><th class="p-3 border">店舗名</th><th class="p-3 border">お客様名</th><th class="p-3 border">車種</th><th class="p-3 border">ナンバー</th><th class="p-3 border">備考</th></tr></thead><tbody id="list-s" class="divide-y-2"></tbody></table></div>
                <div id="area-f" class="hidden overflow-x-auto"><table class="w-full border-2 text-left text-lg"><thead class="bg-orange-50"><tr><th class="p-3 border text-orange-700">工場入庫日</th><th class="p-3 border">車検日</th><th class="p-3 border text-blue-700">コース名</th><th class="p-3 border">店舗名</th><th class="p-3 border">お客様名</th><th class="p-3 border">車種</th><th class="p-3 border">ナンバー</th><th class="p-3 border">備考</th></tr></thead><tbody id="list-f" class="divide-y-2"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz1ijHuMbfFL-GKxJAoKG16dcPgVmVM1Alk-7PFhNfqsJ2x_XYGYTlOfj3fwcDrB3hK/exec"; 
        let curC = '', selS = '', selA = '', vD = new Date(), pics = {1:"",2:"",3:""};
        const HOLS = ["2026/1/1","2026/1/12","2026/2/11","2026/2/23","2026/3/20","2026/4/29","2026/5/3","2026/5/4","2026/5/5","2026/5/6","2026/7/20","2026/8/11","2026/9/21","2026/9/22","2026/9/23","2026/10/12","2026/11/3","2026/11/23"];

        function handleStoreChange(val) {
            if (val === "車検課") { if (prompt("車検課専用パスワード") !== "ss1234") { alert("パスワードエラー"); document.getElementById('sel-ss').value = ""; return; } }
            renderCal();
        }

        function imgP(input, n) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        pics[n] = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById(`i${n}`).src = pics[n];
                        document.getElementById(`i${n}`).classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function selectCourse(n) { curC = n; document.getElementById('disp-c').innerText = n; document.getElementById('row-s').classList.toggle('hidden', n==='一般整備・修理'); document.getElementById('row-a').classList.toggle('hidden', n==='スタンダード車検'); renderCal(); showSection('form-section'); }
        
        function renderCal() {
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const y = vD.getFullYear(), m = vD.getMonth(), ss = document.getElementById('sel-ss').value;
            const today = new Date(); today.setHours(0,0,0,0);
            const limitDate = new Date(); limitDate.setDate(today.getDate() + 3); // 3日後の日付を取得

            document.getElementById('cal-m').innerText = `${y}年 ${m+1}月`;
            ['日','月','火','水','木','金','土'].forEach(d => grid.insertAdjacentHTML('beforeend', `<div class="text-gray-400 font-bold mb-1">${d}</div>`));
            const f = new Date(y, m, 1).getDay(), l = new Date(y, m+1, 0).getDate();
            for(let i=0; i<f; i++) grid.appendChild(document.createElement('div'));
            for(let i=1; i<=l; i++) {
                const target = new Date(y, m, i);
                const k = `${y}/${m+1}/${i}`;
                const isH = target.getDay()===0 || target.getDay()===6 || HOLS.includes(k);
                
                // 【車検課以外】 かつ 【3日以内 または 休日】 の場合は制限
                const isPast = (target < limitDate);
                const isLocked = (ss !== "車検課") && (isPast || isH);

                const div = document.createElement('div');
                div.className = `p-4 border rounded-xl flex items-center justify-center font-black ${isLocked?'disabled-day text-slate-300':'hover:bg-blue-100 cursor-pointer'}`;
                if (isH && ss !== "車検課") div.classList.add('text-red-300');
                div.innerHTML = i;
                div.onclick = () => { 
                    if(isLocked) return; 
                    document.querySelectorAll('#cal-grid div').forEach(d => d.classList.remove('selected-day')); 
                    div.classList.add('selected-day'); 
                    if (curC==='一般整備・修理') { selA = k; selS = ""; } 
                    else { selS = k; selA = (curC==='セーフティ車検') ? getPrevBiz(k) : ""; } 
                    document.getElementById('date-s').innerText = selS || '-'; 
                    document.getElementById('date-a').innerText = selA || '-'; 
                };
                grid.appendChild(div);
            }
        }

        function getPrevBiz(ds) { let d = new Date(ds); do { d.setDate(d.getDate()-1); } while (d.getDay()===0||d.getDay()===6||HOLS.includes(`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`)); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
        
        function openConfirm() {
            const ss = document.getElementById('sel-ss').value;
            const name = document.getElementById('u-name').value;
            if(!ss || !name || (!selS && !selA)) { alert("未入力の項目があります"); return; }
            const html = `<p>コース：${curC}</p><p>店舗：${ss}</p><p>お客様：${name}</p><p>車種：${document.getElementById('u-model').value}</p><p>ナンバー：${document.getElementById('u-num').value}</p><p class="text-blue-600">車検：${selS||'-'}</p><p class="text-orange-600">入庫：${selA||'-'}</p>`;
            document.getElementById('confirm-data').innerHTML = html;
            showSection('confirm-section');
        }

        async function send() { 
            const btn = document.getElementById('sb-btn'); btn.innerText = "送信中..."; btn.disabled = true;
            const data = { shakenDate: selS, arrivalDate: selA, ss: document.getElementById('sel-ss').value, course: curC, name: document.getElementById('u-name').value, carModel: document.getElementById('u-model').value, carNum: document.getElementById('u-num').value, memo: document.getElementById('u-memo').value, photo1: pics[1], photo2: pics[2], photo3: pics[3] }; 
            try { await fetch(GAS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)}); alert('送信完了'); location.reload(); } catch(e) { alert('エラー'); btn.disabled = false; btn.innerText = "送信する"; } 
        }

        function showSection(id) { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function moveMonth(d) { vD.setMonth(vD.getMonth() + d); renderCal(); }
        function switchAdminTab(type) { document.getElementById('area-s').classList.toggle('hidden', type==='factory'); document.getElementById('area-f').classList.toggle('hidden', type==='shaken'); document.getElementById('tab-s').className = type==='shaken' ? "text-2xl px-4 border-b-8 border-blue-500 text-blue-600" : "text-2xl px-4 text-gray-400"; document.getElementById('tab-f').className = type==='factory' ? "text-2xl px-4 border-b-8 border-slate-700 text-slate-800" : "text-2xl px-4 text-gray-400"; }
        function checkAdmin(pw) { if (prompt("管理者PW") === pw) { showSection('admin-section'); fetch(GAS_URL + "?action=getData").then(res => res.json()).then(data => { const bs = document.getElementById('list-s'), bf = document.getElementById('list-f'); bs.innerHTML = bf.innerHTML = ''; data.forEach(r => { bs.insertAdjacentHTML('beforeend', `<tr><td class="p-3 border font-bold text-blue-800">${r.shakenDate}</td><td class="p-3 border">${r.course}</td><td class="p-3 border">${r.ss}</td><td class="p-3 border font-bold">${r.name}</td><td class="p-3 border">${r.carModel}</td><td class="p-3 border">${r.carNum}</td><td class="p-3 border text-sm">${r.memo}</td></tr>`); if (r.course !== 'スタンダード車検') { bf.insertAdjacentHTML('beforeend', `<tr><td class="p-3 border font-bold text-orange-700">${r.arrivalDate}</td><td class="p-3 border text-gray-400">${r.shakenDate}</td><td class="p-3 border font-bold text-blue-800">${r.course}</td><td class="p-3 border">${r.ss}</td><td class="p-3 border font-bold">${r.name}</td><td class="p-3 border">${r.carModel}</td><td class="p-3 border">${r.carNum}</td><td class="p-3 border text-sm">${r.memo}</td></tr>`); } }); }); } }
    </script>
</body>
</html>
