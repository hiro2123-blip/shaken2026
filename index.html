<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車検予約システム２０２６</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; font-weight: bold; }
        .selected-day { background-color: #3b82f6 !important; color: white !important; }
        .disabled-day { color: #e2e8f0 !important; cursor: not-allowed !important; background-color: #f8fafc; }
        .attached-btn { background-color: #22c55e !important; color: white !important; }
        /* 管理画面テーブルのスタイル強化 */
        .admin-table th { background-color: #f8fafc; color: #475569; font-size: 14px; padding: 12px 8px; border: 1px solid #e2e8f0; white-space: nowrap; }
        .admin-table td { font-size: 15px; padding: 12px 8px; border: 1px solid #e2e8f0; color: #1e293b; }
        .admin-table tr:nth-child(even) { background-color: #fdfdfd; }
        .admin-table tr:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4">
    <div id="app" class="bg-white rounded-3xl shadow-xl p-4 md:p-6 max-w-7xl mx-auto border-2 border-blue-50">
        <div class="flex justify-between items-center mb-6 border-b-2 pb-4">
            <h1 class="text-xl md:text-3xl text-blue-800 font-black" onclick="location.reload()">🏪 車検予約システム２０２６</h1>
            <div class="flex space-x-2">
                <button onclick="showSection('course-section')" class="px-5 py-2 bg-gray-200 rounded-xl text-lg hover:bg-gray-300">新規予約</button>
                <button onclick="checkAdmin('ss1234')" class="px-5 py-2 bg-gray-200 rounded-xl text-lg hover:bg-gray-300">管理画面</button>
            </div>
        </div>

        <div id="main-content">
            <div id="admin-section" class="view-section hidden font-bold">
                <div class="flex space-x-6 mb-6 border-b-4 pb-2 text-2xl">
                    <button onclick="switchAdminTab('shaken')" id="tab-s" class="px-4 border-b-8 border-blue-500 text-blue-600">車検一覧</button>
                    <button onclick="switchAdminTab('factory')" id="tab-f" class="px-4 text-gray-400">工場一覧</button>
                </div>
                <div id="area-s" class="overflow-x-auto">
                    <table class="w-full admin-table text-left shadow-sm rounded-lg">
                        <thead>
                            <tr>
                                <th>車検日</th>
                                <th>店舗</th>
                                <th>お客様名</th>
                                <th>車種</th>
                                <th>ナンバー</th>
                                <th>書類</th>
                                <th>備考</th>
                                <th>受付日時</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="list-s"></tbody>
                    </table>
                </div>
                <div id="area-f" class="hidden overflow-x-auto">
                    <table class="w-full admin-table text-left shadow-sm rounded-lg">
                        <thead>
                            <tr>
                                <th class="text-orange-700">工場入庫日</th>
                                <th>車検日</th>
                                <th>店舗</th>
                                <th>お客様名</th>
                                <th>車種</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="list-f"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzawZDAInwdeIe9uzobkkVUHRqRQJCqyiNWipp1qioDvjdS5jhs634KgTPoW54S0xLU/exec";
        // 基本的な変数は維持
        // （imgP, selectCourse, renderCal, openConfirm, send 等は維持）

        function checkAdmin(pw) {
            if (prompt("管理者パスワードを入力してください") === pw) {
                showSection('admin-section');
                fetchAdminData();
            }
        }

        function fetchAdminData() {
            fetch(GAS_URL + "?action=getData").then(res => res.json()).then(data => {
                const bs = document.getElementById('list-s'), bf = document.getElementById('list-f');
                bs.innerHTML = bf.innerHTML = '';
                data.reverse().forEach(r => { // 新しい順に表示
                    const links = `
                        <div class="flex gap-2">
                            ${r.url1.startsWith('http') ? `<a href="${r.url1}" target="_blank" class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs border border-blue-200">受付表</a>` : ""}
                            ${r.url2.startsWith('http') ? `<a href="${r.url2}" target="_blank" class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs border border-blue-200">車証</a>` : ""}
                        </div>`;
                    const ops = `
                        <div class="flex gap-2">
                            <button onclick="editRow(${r.rowId},'${r.name}')" class="text-blue-500 hover:underline">備考修正</button>
                            <button onclick="deleteRow(${r.rowId},'${r.name}')" class="text-red-500 hover:underline">削除</button>
                        </div>`;

                    // 車検一覧（日付のみ表示）
                    bs.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td class="font-bold text-blue-700">${r.shakenDate}</td>
                            <td>${r.ss}</td>
                            <td class="font-black">${r.name}</td>
                            <td>${r.carModel}</td>
                            <td>${r.carNum}</td>
                            <td>${links}</td>
                            <td class="text-gray-500 text-xs italic">${r.memo}</td>
                            <td class="text-gray-400 text-[10px]">${r.timestamp}</td>
                            <td>${ops}</td>
                        </tr>`);

                    // 工場一覧
                    if (r.course !== 'スタンダード車検') {
                        bf.insertAdjacentHTML('beforeend', `
                            <tr>
                                <td class="font-bold text-orange-600">${r.arrivalDate}</td>
                                <td class="text-gray-400">${r.shakenDate}</td>
                                <td>${r.ss}</td>
                                <td class="font-black">${r.name}</td>
                                <td>${r.carModel}</td>
                                <td>${ops}</td>
                            </tr>`);
                    }
                });
            });
        }

        async function deleteRow(id, n) { if (confirm(`${n}様のデータを完全に削除しますか？`)) { await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:'delete', rowId:id})}); fetchAdminData(); } }
        async function editRow(id, n) { const m = prompt(`${n}様の備考を上書き編集します`, ""); if (m !== null) { await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:'edit', rowId:id, memo:m})}); fetchAdminData(); } }

        // showSection, moveMonth, switchAdminTab 等の基本関数は前回のものを貼り付けてください
    </script>
</body>
</html>
